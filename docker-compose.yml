services:
  postgres:
    image: postgres:16
    container_name: junglelog-postgres
    environment:
      POSTGRES_DB: junglelog
      POSTGRES_USER: junglelog
      POSTGRES_PASSWORD: junglelog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

